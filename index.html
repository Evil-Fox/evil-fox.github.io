<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="shortcut icon" href="img/start_favicon.png" type="image/png">
  <link href="https://fonts.googleapis.com/css?family=Ubuntu:300,400,700" rel="stylesheet">

  <link rel="stylesheet" href="css/style.min.css">
  <title>TEST</title>
</head>
<body>
  <dialog>
    <h2>Изменить</h2>
    <div class="options_panel">
      <input id="edit_name" type="text" name="" placeholder="Имя задачи">
      <textarea id="edit_description" name="name" rows="8" cols="80" placeholder="Описание"></textarea>
      <label for="">
        Введитe срок на выполнение:
        <input id="edit_date" type="date" name="date"/>
      </label>
      <div class="button_block">
        <input  id="editTask" type="submit" name="" value="Применить">
        <button id="closeDialog" type="button" name="button">Отмена</button>
      </div>
    </div>
  </dialog>

    <div class="page">
      <header class="wrapper wrapper_header">
        <section class="frame frame_header">
          <h1 class="header_title">Задачник</h1>
        </section>
      </header>

        <div class="wrapper wrapper_task_management">
          <div class="frame frame_task_management">
            <div class="options_panel">
              <h3>Добавить задачу.</h3>
              <input id="task_name" type="text" name="" placeholder="Имя задачи">
              <textarea id="task_description" name="name" rows="8" cols="80" placeholder="Описание"></textarea>
              <label for="">
                Введитe срок выполнения:
                <input id="task_date" type="date" name="date"/>
              </label>
              <input id="addTask" type="submit" name="" value="Добавить">
              <div id="error"></div>
            </div>
          </div>

          <section class="frame frame_task">
            <h2>Мои задачи</h2>
            <div id="now_task"></div>
          </section>

          <section class="frame frame_task">
            <h2>Выполненные задачи</h2>
            <div id="closed_task"></div>
          </section>

          <section class="frame frame_task">
            <h2>Проваленные задачи</h2>
            <div id="overdue_task"></div>
          </section>
        </div>

        <div class="i">
          <a target="_blank" href="https://github.com/Evil-Fox/evil-fox.github.io/blob/master/scripts/common/task2.js">Мой JavaScript</a>
        </div>
    </div>

    <script src="scripts/vendor.min.js"></script>
    <!-- <script src="data/task.json"></script> -->
    <script src="scripts/common.min.js" defer></script>
</body>
</html>
